name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .[dev]
    - name: Run linting (Ruff)
      run: ruff check .
    - name: Run formatting check (Black)
      run: black --check .
    - name: Run type checking (Mypy)
      run: mypy . --explicit-package-bases
    - name: Run tests
      run: |
        pytest tests/
